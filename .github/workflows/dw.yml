name: DownLord

on:
  workflow_dispatch:
    inputs:
      links:
        description: 'Links (one per line)'
        required: true
        type: string
        default: ''
      storage_mode:
        description: 'Storage mode'
        required: true
        type: choice
        options:
          - main
          - branch
          - artifact
        default: 'main'
      download_mode:
        description: 'Download mode'
        required: true
        type: choice
        options:
          - download
          - torrent_info
          - webpage_archive
        default: 'download'
      video_quality:
        description: 'YouTube video quality'
        required: false
        type: choice
        options:
          - best
          - 1080p
          - 720p
          - 480p
          - 360p
          - audio_only
        default: 'best'
      subtitle_mode:
        description: 'YouTube subtitles'
        required: false
        type: choice
        options:
          - none
          - manual
          - auto
        default: 'manual'
      structure_mode:
        description: 'Torrent structure'
        required: false
        type: choice
        options:
          - flat
          - preserve
          - archive
        default: 'flat'
  push:
    paths: ['.trigger']

permissions:
  contents: write
  actions: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sparse-checkout: |
            .github/
            history/
            .cache/
            .trigger
            .trigger.template
            BOOTSTRAP.md
            INDEX.md
            README.md

      - name: Handle trigger file
        if: github.event_name == 'push'
        run: |
          if [ -f ".trigger" ]; then
            TRIGGER_LINKS=$(cat .trigger | tr '\n' ' ')
            echo "TRIGGER_LINKS=$TRIGGER_LINKS" >> $GITHUB_ENV
            echo "IS_TRIGGER=true" >> $GITHUB_ENV
            rm -f .trigger
            git config --local user.email "action@github.com"
            git config --local user.name "DownLord"
            git add .trigger && git commit -m "Remove trigger" && git push || true
          else
            echo "No trigger file"; exit 0
          fi

      - name: Set inputs
        id: inputs
        run: |
          if [ "$IS_TRIGGER" = "true" ]; then
            echo "LINKS=$TRIGGER_LINKS" >> $GITHUB_ENV
            echo "STORAGE_MODE=main" >> $GITHUB_ENV
            echo "DOWNLOAD_MODE=download" >> $GITHUB_ENV
            echo "QUALITY=best" >> $GITHUB_ENV
            echo "SUBTITLE_MODE=manual" >> $GITHUB_ENV
            echo "STRUCTURE_MODE=flat" >> $GITHUB_ENV
          else
            echo "LINKS=${{ github.event.inputs.links }}" >> $GITHUB_ENV
            echo "STORAGE_MODE=${{ github.event.inputs.storage_mode }}" >> $GITHUB_ENV
            echo "DOWNLOAD_MODE=${{ github.event.inputs.download_mode }}" >> $GITHUB_ENV
            echo "QUALITY=${{ github.event.inputs.video_quality }}" >> $GITHUB_ENV
            echo "SUBTITLE_MODE=${{ github.event.inputs.subtitle_mode }}" >> $GITHUB_ENV
            echo "STRUCTURE_MODE=${{ github.event.inputs.structure_mode }}" >> $GITHUB_ENV
          fi

      - name: Install core tools (7-day apt cache)
        run: |
          if command -v aria2c && command -v 7z && command -v jq; then
            if [ -f .github/.last_apt_update ]; then
              DAYS=$(( ($(date +%s) - $(cat .github/.last_apt_update)) / 86400 ))
              if [ $DAYS -le 7 ]; then
                echo "Core tools up-to-date ($DAYS days)."
                exit 0
              fi
            fi
          fi
          sudo apt-get update -qq
          sudo apt-get install -y aria2 p7zip-full p7zip-rar curl jq python3 python3-requests
          date +%s > .github/.last_apt_update

      - uses: actions/cache@v4
        with:
          path: /usr/local/bin/yt-dlp
          key: ytdlp-static-${{ hashFiles('.github/.last_media_update') }}
      - uses: actions/cache@v4
        with:
          path: /usr/local/bin/ffmpeg
          key: ffmpeg-static-${{ hashFiles('.github/.last_media_update') }}
      - uses: actions/cache@v4
        with:
          path: /usr/local/bin/ffprobe
          key: ffprobe-static-${{ hashFiles('.github/.last_media_update') }}

      - name: Debug ffmpeg download
        run: |
          URL="https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
          echo "Trying URL: $URL"
          HTTP_CODE=$(curl -sL -w "%{http_code}" -o /tmp/ffmpeg_debug "$URL")
          echo "HTTP status: $HTTP_CODE"
          echo "File type:"
          file /tmp/ffmpeg_debug || true
          echo "First 200 bytes:"
          head -c 200 /tmp/ffmpeg_debug || true
          
      - name: Install media tools if needed
        run: |
          URLS="$LINKS"
          MODE="$DOWNLOAD_MODE"
          [[ "$MODE" == "torrent_info" || "$MODE" == "webpage_archive" ]] && exit 0
          NEED_MEDIA=false
          for URL in $URLS; do
            if echo "$URL" | grep -qE "(youtube|youtu\.be|vimeo|tiktok|twitch|dailymotion|bilibili|soundcloud|spotify|bandcamp|mixcloud|audiomack|deezer|tidal)"; then
              NEED_MEDIA=true
              break
            fi
          done
          [ "$NEED_MEDIA" = false ] && exit 0
          if command -v yt-dlp && command -v ffprobe; then
            if [ -f .github/.last_media_update ]; then
              DAYS=$(( ($(date +%s) - $(cat .github/.last_media_update)) / 86400 ))
              [ $DAYS -le 7 ] && { echo "Media tools up-to-date."; exit 0; }
            fi
          fi
          if ! command -v yt-dlp; then
            curl -sL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
            chmod +x /usr/local/bin/yt-dlp
          fi
          if ! command -v ffmpeg; then
            FFMPEG_URL="https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
            curl -sL "$FFMPEG_URL" -o /tmp/ffmpeg.tar.xz
            tar xf /tmp/ffmpeg.tar.xz -C /tmp/
            cp /tmp/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /tmp/ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/
            rm -rf /tmp/ffmpeg-master-latest-linux64-gpl /tmp/ffmpeg.tar.xz
          fi
          date +%s > .github/.last_media_update
          
      - name: Install monolith (webpage archive)
        if: env.DOWNLOAD_MODE == 'webpage_archive'
        run: |
          command -v monolith || {
            curl -sL https://github.com/Y2Z/monolith/releases/latest/download/monolith-gnu-linux-x86_64 -o /usr/local/bin/monolith
            chmod +x /usr/local/bin/monolith
          }

      - name: Background yt-dlp update
        run: |
          ( command -v yt-dlp && curl -sL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp.new && chmod +x /usr/local/bin/yt-dlp.new ) &

      - name: Torrent info mode
        if: env.DOWNLOAD_MODE == 'torrent_info'
        run: |
          URL=$(echo "$LINKS" | head -n1)
          TS=$(TZ='Asia/Tehran' date +%Y%m%d_%H%M%S)
          mkdir -p history/$TS
          if [[ "$URL" == magnet:* ]]; then
            sudo apt-get install -y transmission-cli
            transmission-show "$URL" > /tmp/torrent_info.txt 2>&1 || echo "No metadata available" > /tmp/torrent_info.txt
          else
            curl -sL "$URL" -o /tmp/torrent.torrent
            transmission-show /tmp/torrent.torrent > /tmp/torrent_info.txt 2>&1 || aria2c --show-files /tmp/torrent.torrent > /tmp/torrent_info.txt 2>&1
          fi
          {
            echo "# Torrent Info"
            echo "**Date:** $(TZ='Asia/Tehran' date +'%Y-%m-%d %H:%M')"
            echo "**URL:** \`$URL\`"
            echo ""
            echo '```'
            cat /tmp/torrent_info.txt
            echo '```'
          } > history/$TS/info.md
          git config --local user.email "action@github.com"
          git config --local user.name "DownLord"
          git add history/$TS/
          git commit -m "Torrent info: $TS"
          git push
          exit 0

      - name: Setup YouTube API script (DEBUG)
        run: |
          cat > /tmp/yt_api.py << 'PYEOF'
          import os, sys, time, requests, re, json, traceback
          url = sys.argv[1]
          quality_input = sys.argv[2]
          outdir = sys.argv[3]
          API = 'https://hub.ytconvert.org/api/download'
          HEADERS = {
              'User-Agent': 'Mozilla/5.0',
              'Accept': 'application/json',
              'Referer': 'https://media.ytmp3.gg/',
              'Origin': 'https://media.ytmp3.gg'
          }
          if "Audio" in quality_input:
              payload = {'url': url, 'os': 'linux', 'output': {'type': 'audio', 'format': 'mp3'}, 'audio': {'bitrate': '320k'}}
              ext = 'mp3'
          elif "1080" in quality_input:
              payload = {'url': url, 'os': 'linux', 'output': {'type': 'video', 'format': 'mp4', 'quality': '1080p'}}
              ext = 'mp4'
          elif "720" in quality_input:
              payload = {'url': url, 'os': 'linux', 'output': {'type': 'video', 'format': 'mp4', 'quality': '720p'}}
              ext = 'mp4'
          elif "480" in quality_input:
              payload = {'url': url, 'os': 'linux', 'output': {'type': 'video', 'format': 'mp4', 'quality': '480p'}}
              ext = 'mp4'
          else:
              payload = {'url': url, 'os': 'linux', 'output': {'type': 'video', 'format': 'mp4', 'quality': '720p'}}
              ext = 'mp4'
          try:
              print(f"[DEBUG] Sending request to API with payload: {payload}", file=sys.stderr)
              resp = requests.post(API, json=payload, headers=HEADERS, timeout=15)
              print(f"[DEBUG] POST status: {resp.status_code}", file=sys.stderr)
              print(f"[DEBUG] Response body: {resp.text[:300]}", file=sys.stderr)
              if resp.status_code != 200:
                  print("[DEBUG] Non-200 response, exiting", file=sys.stderr)
                  sys.exit(1)
              status_url = resp.json().get('statusUrl')
              print(f"[DEBUG] Status URL: {status_url}", file=sys.stderr)
              if not status_url:
                  print("[DEBUG] No status URL", file=sys.stderr)
                  sys.exit(1)
              for i in range(60):
                  time.sleep(2)
                  s_resp = requests.get(status_url, headers=HEADERS, timeout=10)
                  print(f"[DEBUG] Poll {i}: status={s_resp.status_code}", file=sys.stderr)
                  if s_resp.status_code == 200:
                      data = s_resp.json()
                      print(f"[DEBUG] Poll data: {json.dumps(data)[:200]}", file=sys.stderr)
                      if data.get('status') == 'completed':
                          dl_url = data.get('downloadUrl')
                          raw_title = data.get('title', 'YouTube_Video')
                          title = re.sub(r'[\\/*?:"<>| ]', '_', raw_title)
                          if dl_url:
                              print(f"[DEBUG] Download URL obtained: {dl_url[:100]}...", file=sys.stderr)
                              filepath = os.path.join(outdir, f"{title}.{ext}")
                              print(f"[DEBUG] Starting download to {filepath}", file=sys.stderr)
                              dl_req = requests.get(dl_url, stream=True, timeout=60)
                              with open(filepath, "wb") as f:
                                  for chunk in dl_req.iter_content(8192):
                                      if chunk: f.write(chunk)
                              print(f"[DEBUG] Download complete, size: {os.path.getsize(filepath)} bytes", file=sys.stderr)
                              print(f"DOWNLOADED:{filepath}")
                              sys.exit(0)
                      elif data.get('status') in ('failed', 'error'):
                          print(f"[DEBUG] Conversion failed: {data}", file=sys.stderr)
                          sys.exit(1)
              print("[DEBUG] Timed out waiting for completion", file=sys.stderr)
              sys.exit(1)
          except Exception as e:
              print(f"[DEBUG] Exception: {traceback.format_exc()}", file=sys.stderr)
              sys.exit(1)
          PYEOF
          chmod +x /tmp/yt_api.py
          
      - name: Process each link
        id: download
        run: |
          set -e
          TS_BASE=$(TZ='Asia/Tehran' date +%Y%m%d_%H%M%S)
          > /tmp/errors.log
          > /tmp/folder_urls.txt
          for URL in $LINKS; do
            [ -z "$URL" ] && continue
            echo "=== Processing: $URL ==="
            CLEAN=$(echo "$URL" | grep -oP 'dn=[^&]*' | sed 's/dn=//' | python3 -c "import sys,urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))" 2>/dev/null | sed 's/[^a-zA-Z0-9._-]/_/g' | cut -c1-100)
            [ -z "$CLEAN" ] && CLEAN=$(basename "$(echo "$URL" | sed 's/\?.*//')" | sed 's/[^a-zA-Z0-9._-]/_/g' | cut -c1-100)
            [ -z "$CLEAN" ] && CLEAN="download"
            DD="downloads/${TS_BASE}_${CLEAN}"
            mkdir -p "$DD"
            echo "FOLDER=$DD URL=$URL" >> /tmp/folder_urls.txt
            IS_TORRENT=false; IS_YOUTUBE=false; IS_WEBPAGE=false
            if [[ "$URL" == magnet:* ]] || echo "$URL" | grep -qE '\.torrent(\?.*)?$'; then
              IS_TORRENT=true
            elif echo "$URL" | grep -qE "(youtube|youtu\.be)"; then
              IS_YOUTUBE=true
            elif [ "$DOWNLOAD_MODE" = "webpage_archive" ]; then
              IS_WEBPAGE=true
            fi
            if [ "$IS_TORRENT" = true ]; then
              if [[ "$URL" == magnet:* ]]; then
                IN="$URL"
              else
                curl -sL "$URL" -o "$DD/torrent.torrent"
                IN="$DD/torrent.torrent"
              fi
              ARGS="--seed-time=0 -x16 -s16 --dir=$DD --continue --file-allocation=falloc"
              aria2c $ARGS "$IN" || echo "FAIL:$URL" >> /tmp/errors.log
              rm -f "$DD/torrent.torrent"
            elif [ "$IS_WEBPAGE" = true ]; then
              DOMAIN=$(echo "$URL" | sed 's|https\?://||; s|/.*||')
              monolith "$URL" -o "$DD/$DOMAIN.html" || echo "FAIL:$URL" >> /tmp/errors.log
            elif [ "$IS_YOUTUBE" = true ]; then
              COOKIE_ARG=""
              if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
                echo "${{ secrets.YOUTUBE_COOKIES }}" > /tmp/cookies.txt
                COOKIE_ARG="--cookies /tmp/cookies.txt"
              fi
              SUCCESS=false
              if [ -n "$COOKIE_ARG" ]; then
                echo "[YT] Cookies found — trying yt-dlp"
                SUB_FLAG=""
                case "$SUBTITLE_MODE" in
                  manual) SUB_FLAG="--write-subs --embed-subs --sub-lang en" ;;
                  auto) SUB_FLAG="--write-auto-subs --embed-subs --sub-lang en" ;;
                esac
                case "$QUALITY" in
                  best) F="-f bestvideo+bestaudio/best --merge-output-format mp4" ;;
                  1080p) F="-f 'bestvideo[height<=1080]+bestaudio/best[height<=1080]' --merge-output-format mp4" ;;
                  720p) F="-f 'bestvideo[height<=720]+bestaudio/best[height<=720]' --merge-output-format mp4" ;;
                  480p) F="-f 'bestvideo[height<=480]+bestaudio/best[height<=480]' --merge-output-format mp4" ;;
                  360p) F="-f 'bestvideo[height<=360]+bestaudio/best[height<=360]' --merge-output-format mp4" ;;
                  audio_only) F="-x --audio-format mp3" ;;
                esac
                yt-dlp $COOKIE_ARG $F $SUB_FLAG --no-playlist --no-abort-on-error --restrict-filenames -o "$DD/%(title)s.%(ext)s" "$URL" && SUCCESS=true
                if [ "$SUCCESS" = true ]; then
                  yt-dlp --write-thumbnail --skip-download -o "$DD/thumb" "$URL" 2>/dev/null
                  ffmpeg -i "$DD/thumb.webp" "$DD/thumb.jpg" 2>/dev/null && rm "$DD/thumb.webp" || true
                else
                  echo "[YT] yt-dlp failed — falling back to Fast API"
                fi
              fi
                          if [ "$SUCCESS" != true ]; then
              echo "[YT] Using Fast API"
              API_OUTPUT=$(python3 /tmp/yt_api.py "$URL" "$QUALITY" "$DD" 2> /tmp/yt_api_debug.log)
              echo "$API_OUTPUT"
              echo "=== Debug log from Fast API ==="
              cat /tmp/yt_api_debug.log
              echo "==============================="
              if echo "$API_OUTPUT" | grep -q "DOWNLOADED:"; then
                SUCCESS=true
              else
                echo "FAIL:$URL" >> /tmp/errors.log
              fi
            fi
              [ "$SUCCESS" != true ] && echo "FAIL:$URL" >> /tmp/errors.log
            else
              if echo "$URL" | grep -qE "(vimeo|tiktok|twitch|dailymotion|bilibili|soundcloud|spotify|bandcamp|mixcloud|audiomack|deezer|tidal)"; then
                COOKIE_ARG=""
                [ -n "${{ secrets.YOUTUBE_COOKIES }}" ] && { echo "${{ secrets.YOUTUBE_COOKIES }}" > /tmp/cookies.txt; COOKIE_ARG="--cookies /tmp/cookies.txt"; }
                yt-dlp $COOKIE_ARG --no-playlist --restrict-filenames -o "$DD/%(title)s.%(ext)s" "$URL" || echo "FAIL:$URL" >> /tmp/errors.log
              else
                OUTFILE=$(basename "$(echo "$URL" | sed 's/\?.*//')" | sed 's/[^a-zA-Z0-9._-]/_/g')
                aria2c -x16 -s16 --dir="$DD" --out="$OUTFILE" --continue --file-allocation=falloc "$URL" || echo "FAIL:$URL" >> /tmp/errors.log
              fi
            fi
          done
          echo "downloads_dir=downloads" >> $GITHUB_OUTPUT
          echo "timestamp=$TS_BASE" >> $GITHUB_OUTPUT

      - name: Archive torrent folder
        if: env.STRUCTURE_MODE == 'archive'
        run: |
          for D in downloads/${TIMESTAMP}_*; do
            [ -d "$D" ] || continue
            FILE_COUNT=$(find "$D" -type f | wc -l)
            if [ $FILE_COUNT -gt 1 ]; then
              NAME=$(basename "$D")
              7z a -tzip -mx0 -mmt=on "$D.zip" "$D" && rm -rf "$D"
            fi
          done

      - name: Split large files
        if: env.STORAGE_MODE != 'artifact'
        run: |
          TS="${{ steps.download.outputs.timestamp }}"
          for D in downloads/${TS}_*; do
            [ -d "$D" ] || continue
            find "$D" -type f ! -name "*.7z.*" -print0 | while IFS= read -r -d '' f; do
              SIZE=$(stat -c%s "$f" 2>/dev/null)
              BASENAME=$(basename "$f")
              DIR=$(dirname "$f")
              find "$DIR" -maxdepth 1 -name "$BASENAME.7z.*" | head -n1 | grep -q . && continue
              if [ "$SIZE" -gt $((95*1048576)) ]; then
                (echo "Split: $BASENAME"; 7z a -v95m -mx0 -mmt=on "$f.7z" "$f" && rm "$f") &
              fi
            done
          done
          wait

      - name: Upload as artifact
        if: env.STORAGE_MODE == 'artifact'
        uses: actions/upload-artifact@v4
        with:
          name: download-${{ steps.download.outputs.timestamp }}
          path: downloads/
          retention-days: 90

      - name: Generate per-download metadata
        if: env.STORAGE_MODE != 'artifact'
        run: |
          TS="${{ steps.download.outputs.timestamp }}"
          mkdir -p "history/$TS"
          for D in downloads/${TS}_*; do
            [ -d "$D" ] || continue
            FOLDER=$(basename "$D")
            MANIFEST="history/$TS/${FOLDER}.json"
            echo "{\"timestamp\":\"$TS\",\"folder\":\"$FOLDER\",\"files\":[" > "$MANIFEST"
            FIRST=true
            find "$D" -type f -print0 | sort -z | while IFS= read -r -d '' f; do
              REL="${f#$D/}"
              SZ=$(stat -c%s "$f")
              HS=$(sha256sum "$f" | cut -d' ' -f1)
              [ "$FIRST" = false ] && echo "," >> "$MANIFEST"
              FIRST=false
              echo "{\"path\":\"$REL\",\"size\":$SZ,\"sha256\":\"$HS\"}" >> "$MANIFEST"
            done
            echo "]}" >> "$MANIFEST"
            # Robust SHA256SUMS – never fails on empty folders
            find "$D" -maxdepth 1 -type f -exec sha256sum {} + > "$D/SHA256SUMS"
            BRANCH="${GITHUB_REF_NAME:-main}"
            REPO="${{ github.repository }}"
            find "$D" -type f -print0 | sort -z | while IFS= read -r -d '' f; do
              REL="${f#$D/}"
              echo "https://raw.githubusercontent.com/$REPO/$BRANCH/downloads/$FOLDER/$REL"
            done > "history/$TS/${FOLDER}_links.txt"
            cat > "$D/download.sh" << EOF
          #!/bin/bash
          REPO="https://github.com/$REPO.git"
          BRANCH="$BRANCH"
          FOLDER="downloads/$FOLDER"
          git clone --depth 1 --filter=blob:none --no-checkout "\$REPO" tmp
          cd tmp
          git sparse-checkout init --cone
          git sparse-checkout set "\$FOLDER"
          git checkout
          echo "Done: tmp/\$FOLDER"
          EOF
            chmod +x "$D/download.sh"
          done
          
      - name: Update history and indexes
        if: env.STORAGE_MODE != 'artifact'
        run: |
          cat > /tmp/update_history.py << 'PYEOF'
          import json, os, re, glob
          from collections import defaultdict

          ts = os.environ['TS']
          repo = os.environ['REPO']
          branch = os.environ['BRANCH']
          mode = os.environ['DOWNLOAD_MODE']
          quality = os.environ.get('QUALITY','best')
          subtitle = os.environ.get('SUBTITLE_MODE','none')
          structure = os.environ.get('STRUCTURE_MODE','flat')
          storage = os.environ.get('STORAGE_MODE','main')

          failures = set()
          if os.path.exists('/tmp/errors.log'):
              with open('/tmp/errors.log') as ef:
                  for line in ef:
                      if line.startswith('FAIL:'):
                          failures.add(line.strip().split(':',1)[1].strip())

          folder_status = {}
          if os.path.exists('/tmp/folder_urls.txt'):
              with open('/tmp/folder_urls.txt') as f:
                  for line in f:
                      if '=' not in line: continue
                      parts = line.strip().split(' ', 1)
                      folder = None; url = None
                      for part in parts:
                          if part.startswith('FOLDER='):
                              folder = part.split('=',1)[1]
                          elif part.startswith('URL='):
                              url = part.split('=',1)[1]
                      if folder and url:
                          folder_status[folder] = 'failed' if url in failures else 'success'

          def file_emoji(fname):
              ext = fname.lower().split('.')[-1] if '.' in fname else ''
              emoji_map = {
                  'mp4': '🎬', 'mkv': '🎬', 'webm': '🎬',
                  'mp3': '🎵', 'flac': '🎵', 'wav': '🎵',
                  'zip': '🗜️', '7z': '🗜️', 'rar': '🗜️',
                  'jpg': '🖼️', 'png': '🖼️', 'gif': '🖼️',
                  'pdf': '📕', 'epub': '📗', 'html': '🌐',
                  'srt': '💬', 'vtt': '💬'
              }
              return emoji_map.get(ext, '📄')

          new_entries = []
          total_session_size = 0
          total_session_count = 0
          manifest_pattern = f"history/{ts}/*.json"
          for manifest_path in sorted(glob.glob(manifest_pattern)):
              with open(manifest_path) as f:
                  data = json.load(f)
              folder = data['folder']
              dd = f"downloads/{folder}"
              session_ts = data['timestamp']

              normal = []
              splits = defaultdict(list)
              for fi in data['files']:
                  p = fi['path']
                  mt = re.match(r'(.+)\.7z\.(\d{3})$', p)
                  if mt:
                      splits[mt.group(1)].append(fi)
                  else:
                      normal.append(fi)

              status = folder_status.get(folder, 'success')
              icon = '🔴' if status == 'failed' else '🟢' if status == 'success' else '🟡'

              rows = []
              for fi in normal:
                  raw = f"https://raw.githubusercontent.com/{repo}/{branch}/{dd}/{fi['path']}"
                  size = fi.get('size',0)
                  rows.append((file_emoji(fi['path']), fi['path'], size, raw, False, 0))
              for base, parts in sorted(splits.items()):
                  parts.sort(key=lambda x: x['path'])
                  total_part_size = sum(p['size'] for p in parts)
                  raw_first = f"https://raw.githubusercontent.com/{repo}/{branch}/{dd}/{parts[0]['path']}"
                  rows.append(('📦', f"{base}.7z ({len(parts)} parts)", total_part_size, raw_first, True, len(parts)))
                  for i, p in enumerate(parts):
                      raw_p = f"https://raw.githubusercontent.com/{repo}/{branch}/{dd}/{p['path']}"
                      prefix = '&nbsp;&nbsp;&nbsp;&nbsp;├─' if i < len(parts)-1 else '&nbsp;&nbsp;&nbsp;&nbsp;└─'
                      rows.append(('', f"{prefix} {p['path']}", p['size'], raw_p, False, 0))

              entry_lines = []
              entry_lines.append(f"## {icon} {folder} — {sum(fi['size'] for fi in data['files'])} bytes — {session_ts}")
              entry_lines.append(f"**Mode:** {mode} | **Quality:** {quality} | **Subtitles:** {subtitle} | **Torrent:** {structure}")
              entry_lines.append("")
              entry_lines.append("| File | Size | Download |")
              entry_lines.append("|------|------|----------|")
              for emoji, name, size, url, is_group, part_count in rows:
                  size_str = f"{size/1048576:.0f} MB" if size >= 1048576 else f"{size/1024:.0f} KB" if size >= 1024 else f"{size} B"
                  if emoji and not name.startswith('&nbsp'):
                      display_name = f"{emoji} {name}"
                  else:
                      display_name = name
                  download_link = f"[⬇]({url})" if url else ""
                  entry_lines.append(f"| {display_name} | {size_str} | {download_link} |")
              entry_lines.append("")
              entry_lines.append(f"📥 [All links (links.txt)](https://raw.githubusercontent.com/{repo}/{branch}/history/{ts}/{folder}_links.txt) | 💾 [Git download script](https://raw.githubusercontent.com/{repo}/{branch}/{dd}/download.sh)")
              entry_lines.append("")
              entry_lines.append("---")
              new_entries.append("\n".join(entry_lines))

              total_session_size += sum(fi['size'] for fi in data['files'])
              total_session_count += 1

          readme_path = "history/README.md"
          total_size = total_session_size
          total_count = total_session_count
          for root, dirs, files in os.walk("history"):
              for mf in files:
                  if mf.endswith('.json') and os.path.dirname(os.path.join(root, mf)) != f"history/{ts}":
                      try:
                          with open(os.path.join(root, mf)) as f:
                              old_data = json.load(f)
                          total_size += sum(fi['size'] for fi in old_data['files'])
                          total_count += 1
                      except: pass

          header = f"# 📥 Download History\n**Total Size:** {total_size/1073741824:.1f} GB | **Downloads:** {total_count}\n\n---\n\n"
          if os.path.exists(readme_path):
              with open(readme_path) as f:
                  existing = f.read()
              if "---" in existing:
                  parts = existing.split("---\n", 1)
                  new_content = parts[0] + "---\n\n" + "\n".join(new_entries) + "\n" + parts[1]
              else:
                  new_content = header + "\n".join(new_entries)
          else:
              new_content = header + "\n".join(new_entries)
          with open(readme_path, 'w') as f:
              f.write(new_content)

          index_lines = ["# Content Index", "", "| Folder | Files | Git Command |", "|--------|-------|-------------|"]
          for root, dirs, files in os.walk("history"):
              for mf in files:
                  if mf.endswith('.json'):
                      with open(os.path.join(root, mf)) as f:
                          data = json.load(f)
                      folder = data['folder']
                      dd = f"downloads/{folder}"
                      fcount = len(data['files'])
                      git_cmd = f"`git sparse-checkout add {dd}/ && git checkout`"
                      index_lines.append(f"| {folder} | {fcount} | {git_cmd} |")
          with open('INDEX.md', 'w') as f:
              f.write("\n".join(index_lines) + "\n")

          size_gb = total_size / 1073741824
          badge_svg = f'<svg xmlns="http://www.w3.org/2000/svg" width="320" height="40"><rect width="320" height="40" fill="#1a1a2e" rx="6"/><text x="15" y="25" fill="#e0e0e0" font-size="13" font-family="monospace">📦 {size_gb:.1f} GB | 📂 {total_count} downloads</text></svg>'
          with open('history/badge.svg', 'w') as f:
              f.write(badge_svg)

          if not os.path.exists('BOOTSTRAP.md'):
              with open('BOOTSTRAP.md', 'w') as f:
                  f.write(f"""# Git-Only Access

          If raw.githubusercontent.com is blocked, use git.

          ## Browse history
          ```bash
          git clone --depth 1 --filter=blob:none --no-checkout https://github.com/{repo}.git
          cd {repo.split('/')[1]}
          git sparse-checkout init --cone
          git sparse-checkout set history/ BOOTSTRAP.md INDEX.md
          git checkout
          cat history/README.md
          ```

          ## Download a folder
          ```bash
          git sparse-checkout add downloads/FOLDER_NAME/
          git checkout
          ```

          ## Use a download script
          ```bash
          bash downloads/FOLDER_NAME/download.sh
          ```
          """)

          if not os.path.exists('.trigger.template'):
              with open('.trigger.template', 'w') as f:
                  f.write("""# DownLord Trigger
          # Copy to .trigger, add links, push
          links=https://example.com/file.zip
          storage_mode=main
          download_mode=download
          video_quality=best
          subtitle_mode=manual
          structure_mode=flat
          """)
          print("History and indexes updated.")
          PYEOF

          export TS="${{ steps.download.outputs.timestamp }}"
          export REPO="${{ github.repository }}"
          export BRANCH="${{ github.ref_name }}"
          export DOWNLOAD_MODE="$DOWNLOAD_MODE"
          export QUALITY="$QUALITY"
          export SUBTITLE_MODE="$SUBTITLE_MODE"
          export STRUCTURE_MODE="$STRUCTURE_MODE"
          export STORAGE_MODE="$STORAGE_MODE"
          python3 /tmp/update_history.py

      - name: Commit and push (main mode)
        if: env.STORAGE_MODE == 'main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "DownLord"
          git add .github/ history/ INDEX.md BOOTSTRAP.md .trigger.template || true
          TS="${{ steps.download.outputs.timestamp }}"
          BATCH_SIZE=0
          BATCH_NUM=1
          > /tmp/batch_files.txt
          for D in downloads/${TS}_*; do
            [ -d "$D" ] || continue
            find "$D" -type f -print0 | while IFS= read -r -d '' f; do
              SZ=$(stat -c%s "$f" 2>/dev/null || echo 0)
              echo "$f" >> /tmp/batch_files.txt
              BATCH_SIZE=$((BATCH_SIZE + SZ/1048576))
              if [ $BATCH_SIZE -ge 1000 ]; then
                echo "Committing batch $BATCH_NUM ($BATCH_SIZE MB)"
                while IFS= read -r line; do git add --sparse "$line"; done < /tmp/batch_files.txt
                git commit -m "Download $TS (batch $BATCH_NUM)" || true
                git pull --rebase origin ${{ github.ref_name }} || true
                git push
                BATCH_NUM=$((BATCH_NUM + 1))
                BATCH_SIZE=0
                > /tmp/batch_files.txt
              fi
            done
          done
          if [ -s /tmp/batch_files.txt ]; then
            while IFS= read -r line; do git add --sparse "$line"; done < /tmp/batch_files.txt
            git commit -m "Download $TS (final)" || true
            git pull --rebase origin ${{ github.ref_name }} || true
            git push
          fi
          git diff --cached --quiet || { git commit -m "History update $TS" && git push; }

      - name: Commit and push (branch mode)
        if: env.STORAGE_MODE == 'branch'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "DownLord"
          TS="${{ steps.download.outputs.timestamp }}"
          git checkout --orphan "download-$TS"
          git reset --hard
          for D in downloads/${TS}_*; do
            [ -d "$D" ] && git add --sparse "$D"
          done
          git add history/$TS/
          git commit -m "Download $TS"
          git push origin "download-$TS"
