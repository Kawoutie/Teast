name: Full Cleanup

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (list only, no deletions)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Full cleanup
        run: |
          DRY="${{ github.event.inputs.dry_run }}"

          # Set Git identity
          git config --local user.email "action@github.com"
          git config --local user.name "DownLord"

          # Delete downloads
          echo "--- Downloads ---"
          if [ -d downloads ]; then
            if [ "$DRY" = "true" ]; then
              echo "[DRY RUN] Would delete downloads/ folder"
            else
              echo "Deleting downloads/ folder"
              git rm -rf downloads/
            fi
          fi

          # Delete history
          echo "--- History ---"
          if [ -d history ]; then
            if [ "$DRY" = "true" ]; then
              echo "[DRY RUN] Would delete history/ folder"
            else
              echo "Deleting history/ folder"
              git rm -rf history/
            fi
          fi

          # Delete INDEX.md
          if [ -f INDEX.md ]; then
            if [ "$DRY" = "true" ]; then
              echo "[DRY RUN] Would delete INDEX.md"
            else
              echo "Deleting INDEX.md"
              git rm INDEX.md
            fi
          fi

          # Delete session branches
          echo "--- Branches ---"
          git fetch --all
          for branch in $(git branch -r | grep 'origin/download-' | sed 's/origin\///'); do
            if [ "$DRY" = "true" ]; then
              echo "[DRY RUN] Would delete branch: $branch"
            else
              echo "Deleting branch: $branch"
              git push origin --delete "$branch"
            fi
          done

          # Commit
          if [ "$DRY" = "false" ]; then
            if git diff --cached --quiet; then
              echo "Nothing to commit"
            else
              git commit -m "Full cleanup"
              git push
            fi
          fi
